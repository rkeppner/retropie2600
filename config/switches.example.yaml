# RetroPie2600 Switch Configuration
# All pin numbers are Broadcom (BCM) GPIO numbers
# See docs/hardware-guide.md for physical wiring

switches:
  power:
    pin: 26
    type: toggle  # software-only shutdown trigger
    debounce_ms: 500

  tv_type:
    pin: 4          # RIOT Pin 21 → BCM 4 (Physical 7); LOW=B&W, HIGH=Color
    type: toggle
    positions:
      low: "bw"
      high: "color"
    debounce_ms: 20

  game_select:
    pin: 22         # F1
    type: momentary
    debounce_ms: 5

  game_reset:
    pin: 27         # F2
    type: momentary
    debounce_ms: 5

  difficulty_left:
    pin: 23         # RIOT Pin 17 → BCM 23 (Physical 16); LOW=B/Novice, HIGH=A/Pro
    type: toggle
    positions:
      low: "b"
      high: "a"
    debounce_ms: 20

  difficulty_right:
    pin: 25         # RIOT Pin 16 → BCM 25 (Physical 22); LOW=B/Novice, HIGH=A/Pro
    type: toggle
    positions:
      low: "b"
      high: "a"
    debounce_ms: 20

  channel:
    pin: 6          # Direct switch; BCM 6 (Physical 31); LOW=ch3, HIGH=ch2
    type: toggle
    positions:
      low: "3"
      high: "2"
    debounce_ms: 20

power_led:
  pin: 12           # Red LED in original power jack hole

shader:
  retroarch_host: "127.0.0.1"
  retroarch_port: 55355

shutdown:
  command: "sudo shutdown -h now"
  delay_ms: 500     # Debounce delay before triggering shutdown

logging:
  level: INFO
