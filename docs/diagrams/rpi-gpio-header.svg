<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="700" height="640" viewBox="0 0 700 640"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="gpio-title gpio-desc">
  <title id="gpio-title">Raspberry Pi GPIO Header Pin Assignments</title>
  <desc id="gpio-desc">Diagram of the Raspberry Pi 40-pin GPIO header showing which pins are used for Atari 2600 switch connections and power LED</desc>
  
  <style>
    text { font-family: sans-serif; font-size: 12px; }
    .title { font-size: 20px; font-weight: bold; text-anchor: middle; }
    .pin-num { font-size: 10px; text-anchor: middle; dominant-baseline: central; }
    .label-left { text-anchor: end; }
    .label-right { text-anchor: start; }
    .legend { font-size: 12px; }
  </style>

  <rect width="100%" height="100%" fill="white"/>
  
  <text x="350.0" y="40" class="title">Raspberry Pi 3B+ GPIO Header</text>

  <circle cx="310" cy="80" r="10" fill="#DD6B20" />
  <text x="310" y="80" fill="#FFFFFF" class="pin-num">1</text>
  <text x="290" y="84" class="label-left" font-weight="normal">3.3V Power</text>
  <circle cx="390" cy="80" r="10" fill="#E53E3E" />
  <text x="390" y="80" fill="#FFFFFF" class="pin-num">2</text>
  <text x="410" y="84" class="label-right" font-weight="normal">5V Power</text>
  <circle cx="310" cy="106" r="10" fill="#CBD5E0" />
  <text x="310" y="106" fill="#2D3748" class="pin-num">3</text>
  <text x="290" y="110" class="label-left" font-weight="normal">GPIO2 (SDA)</text>
  <circle cx="390" cy="106" r="10" fill="#E53E3E" />
  <text x="390" y="106" fill="#FFFFFF" class="pin-num">4</text>
  <text x="410" y="110" class="label-right" font-weight="normal">5V Power</text>
  <circle cx="310" cy="132" r="10" fill="#CBD5E0" />
  <text x="310" y="132" fill="#2D3748" class="pin-num">5</text>
  <text x="290" y="136" class="label-left" font-weight="normal">GPIO3 (SCL)</text>
  <circle cx="390" cy="132" r="10" fill="#4A5568" />
  <text x="390" y="132" fill="#FFFFFF" class="pin-num">6</text>
  <text x="410" y="136" class="label-right" font-weight="normal">Ground</text>
  <circle cx="310" cy="158" r="10" fill="#38A169" />
  <text x="310" y="158" fill="#FFFFFF" class="pin-num">7</text>
  <text x="290" y="162" class="label-left" font-weight="bold">TV Type (GPIO4)</text>
  <circle cx="390" cy="158" r="10" fill="#CBD5E0" />
  <text x="390" y="158" fill="#2D3748" class="pin-num">8</text>
  <text x="410" y="162" class="label-right" font-weight="normal">GPIO14 (TXD)</text>
  <circle cx="310" cy="184" r="10" fill="#4A5568" />
  <text x="310" y="184" fill="#FFFFFF" class="pin-num">9</text>
  <text x="290" y="188" class="label-left" font-weight="normal">Ground</text>
  <circle cx="390" cy="184" r="10" fill="#CBD5E0" />
  <text x="390" y="184" fill="#2D3748" class="pin-num">10</text>
  <text x="410" y="188" class="label-right" font-weight="normal">GPIO15 (RXD)</text>
  <circle cx="310" cy="210" r="10" fill="#CBD5E0" />
  <text x="310" y="210" fill="#2D3748" class="pin-num">11</text>
  <text x="290" y="214" class="label-left" font-weight="normal">GPIO17</text>
  <circle cx="390" cy="210" r="10" fill="#CBD5E0" />
  <text x="390" y="210" fill="#2D3748" class="pin-num">12</text>
  <text x="410" y="214" class="label-right" font-weight="normal">GPIO18 (PCM_CLK)</text>
  <circle cx="310" cy="236" r="10" fill="#38A169" />
  <text x="310" y="236" fill="#FFFFFF" class="pin-num">13</text>
  <text x="290" y="240" class="label-left" font-weight="bold">Game Reset (GPIO27)</text>
  <circle cx="390" cy="236" r="10" fill="#4A5568" />
  <text x="390" y="236" fill="#FFFFFF" class="pin-num">14</text>
  <text x="410" y="240" class="label-right" font-weight="normal">Ground</text>
  <circle cx="310" cy="262" r="10" fill="#38A169" />
  <text x="310" y="262" fill="#FFFFFF" class="pin-num">15</text>
  <text x="290" y="266" class="label-left" font-weight="bold">Game Select (GPIO22)</text>
  <circle cx="390" cy="262" r="10" fill="#38A169" />
  <text x="390" y="262" fill="#FFFFFF" class="pin-num">16</text>
  <text x="410" y="266" class="label-right" font-weight="bold">Left Difficulty (GPIO23)</text>
  <circle cx="310" cy="288" r="10" fill="#DD6B20" />
  <text x="310" y="288" fill="#FFFFFF" class="pin-num">17</text>
  <text x="290" y="292" class="label-left" font-weight="normal">3.3V Power</text>
  <circle cx="390" cy="288" r="10" fill="#CBD5E0" />
  <text x="390" y="288" fill="#2D3748" class="pin-num">18</text>
  <text x="410" y="292" class="label-right" font-weight="normal">GPIO24</text>
  <circle cx="310" cy="314" r="10" fill="#CBD5E0" />
  <text x="310" y="314" fill="#2D3748" class="pin-num">19</text>
  <text x="290" y="318" class="label-left" font-weight="normal">GPIO10 (MOSI)</text>
  <circle cx="390" cy="314" r="10" fill="#4A5568" />
  <text x="390" y="314" fill="#FFFFFF" class="pin-num">20</text>
  <text x="410" y="318" class="label-right" font-weight="normal">Ground</text>
  <circle cx="310" cy="340" r="10" fill="#CBD5E0" />
  <text x="310" y="340" fill="#2D3748" class="pin-num">21</text>
  <text x="290" y="344" class="label-left" font-weight="normal">GPIO9 (MISO)</text>
  <circle cx="390" cy="340" r="10" fill="#38A169" />
  <text x="390" y="340" fill="#FFFFFF" class="pin-num">22</text>
  <text x="410" y="344" class="label-right" font-weight="bold">Right Difficulty (GPIO25)</text>
  <circle cx="310" cy="366" r="10" fill="#CBD5E0" />
  <text x="310" y="366" fill="#2D3748" class="pin-num">23</text>
  <text x="290" y="370" class="label-left" font-weight="normal">GPIO11 (SCLK)</text>
  <circle cx="390" cy="366" r="10" fill="#CBD5E0" />
  <text x="390" y="366" fill="#2D3748" class="pin-num">24</text>
  <text x="410" y="370" class="label-right" font-weight="normal">GPIO8 (CE0)</text>
  <circle cx="310" cy="392" r="10" fill="#4A5568" />
  <text x="310" y="392" fill="#FFFFFF" class="pin-num">25</text>
  <text x="290" y="396" class="label-left" font-weight="normal">Ground</text>
  <circle cx="390" cy="392" r="10" fill="#CBD5E0" />
  <text x="390" y="392" fill="#2D3748" class="pin-num">26</text>
  <text x="410" y="396" class="label-right" font-weight="normal">GPIO7 (CE1)</text>
  <circle cx="310" cy="418" r="10" fill="#CBD5E0" />
  <text x="310" y="418" fill="#2D3748" class="pin-num">27</text>
  <text x="290" y="422" class="label-left" font-weight="normal">GPIO0 (ID_SD)</text>
  <circle cx="390" cy="418" r="10" fill="#CBD5E0" />
  <text x="390" y="418" fill="#2D3748" class="pin-num">28</text>
  <text x="410" y="422" class="label-right" font-weight="normal">GPIO1 (ID_SC)</text>
  <circle cx="310" cy="444" r="10" fill="#CBD5E0" />
  <text x="310" y="444" fill="#2D3748" class="pin-num">29</text>
  <text x="290" y="448" class="label-left" font-weight="normal">GPIO5</text>
  <circle cx="390" cy="444" r="10" fill="#4A5568" />
  <text x="390" y="444" fill="#FFFFFF" class="pin-num">30</text>
  <text x="410" y="448" class="label-right" font-weight="normal">Ground</text>
  <circle cx="310" cy="470" r="10" fill="#38A169" />
  <text x="310" y="470" fill="#FFFFFF" class="pin-num">31</text>
  <text x="290" y="474" class="label-left" font-weight="bold">Channel (GPIO6)</text>
  <circle cx="390" cy="470" r="10" fill="#38A169" />
  <text x="390" y="470" fill="#FFFFFF" class="pin-num">32</text>
  <text x="410" y="474" class="label-right" font-weight="bold">Power LED (GPIO12)</text>
  <circle cx="310" cy="496" r="10" fill="#CBD5E0" />
  <text x="310" y="496" fill="#2D3748" class="pin-num">33</text>
  <text x="290" y="500" class="label-left" font-weight="normal">GPIO13</text>
  <circle cx="390" cy="496" r="10" fill="#4A5568" />
  <text x="390" y="496" fill="#FFFFFF" class="pin-num">34</text>
  <text x="410" y="500" class="label-right" font-weight="normal">Ground</text>
  <circle cx="310" cy="522" r="10" fill="#CBD5E0" />
  <text x="310" y="522" fill="#2D3748" class="pin-num">35</text>
  <text x="290" y="526" class="label-left" font-weight="normal">GPIO19 (MISO)</text>
  <circle cx="390" cy="522" r="10" fill="#CBD5E0" />
  <text x="390" y="522" fill="#2D3748" class="pin-num">36</text>
  <text x="410" y="526" class="label-right" font-weight="normal">GPIO16</text>
  <circle cx="310" cy="548" r="10" fill="#38A169" />
  <text x="310" y="548" fill="#FFFFFF" class="pin-num">37</text>
  <text x="290" y="552" class="label-left" font-weight="bold">Power/Shutdown (GPIO26)</text>
  <circle cx="390" cy="548" r="10" fill="#CBD5E0" />
  <text x="390" y="548" fill="#2D3748" class="pin-num">38</text>
  <text x="410" y="552" class="label-right" font-weight="normal">GPIO20 (MOSI)</text>
  <circle cx="310" cy="574" r="10" fill="#4A5568" />
  <text x="310" y="574" fill="#FFFFFF" class="pin-num">39</text>
  <text x="290" y="578" class="label-left" font-weight="normal">Ground</text>
  <circle cx="390" cy="574" r="10" fill="#CBD5E0" />
  <text x="390" y="574" fill="#2D3748" class="pin-num">40</text>
  <text x="410" y="578" class="label-right" font-weight="normal">GPIO21 (SCLK)</text>

  <g transform="translate(180, 620)">
    <circle cx="10" cy="10" r="6" fill="#38A169" />
    <text x="25" y="14" class="legend">Active Project Pin</text>
    
    <circle cx="160" cy="10" r="6" fill="#DD6B20" />
    <text x="175" y="14" class="legend">3.3V</text>
    
    <circle cx="230" cy="10" r="6" fill="#E53E3E" />
    <text x="245" y="14" class="legend">5V</text>
    
    <circle cx="290" cy="10" r="6" fill="#4A5568" />
    <text x="305" y="14" class="legend">GND</text>
    
    <circle cx="350" cy="10" r="6" fill="#CBD5E0" />
    <text x="365" y="14" class="legend">Unused</text>
  </g>
</svg>

