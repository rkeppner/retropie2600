<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="wiring-title wiring-desc">
  <title id="wiring-title">Atari 2600 CX-2600A to Raspberry Pi GPIO Wiring</title>
  <desc id="wiring-desc">Wiring diagram showing connections from the 6532 RIOT IC socket pins to Raspberry Pi GPIO pins for all five Atari 2600 console switches</desc>
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; text-anchor: middle; }
      .panel-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #fff; text-anchor: middle; }
      .panel-subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #cbd5e0; text-anchor: middle; }
      .pin-num { font-family: monospace; font-size: 16px; fill: #ecc94b; }
      .pin-name { font-family: Arial, sans-serif; font-size: 14px; fill: #fff; text-anchor: end; }
      .pi-bcm { font-family: monospace; font-size: 16px; fill: #68d391; text-anchor: end; }
      .pi-phys { font-family: Arial, sans-serif; font-size: 14px; fill: #fff; }
      .wire-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; text-anchor: middle; }
      .note-text { font-family: Arial, sans-serif; font-size: 14px; fill: #c53030; text-anchor: middle; }
      .legend-text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="500" fill="#f7fafc" />
  
  <!-- Main Title -->
  <text x="600" y="35" class="title">Atari 2600 CX-2600A &#8594; Raspberry Pi GPIO Wiring</text>

  <!-- Left Panel: RIOT -->
  <g transform="translate(50, 60)">
    <rect width="300" height="350" rx="8" fill="#2D3748" />
    <text x="150" y="30" class="panel-title">6532 RIOT IC Socket</text>
    <text x="150" y="50" class="panel-subtitle">(A202)</text>
    
    <!-- Pins -->
    <g transform="translate(0, 10)">
      <!-- 24 -->
      <text x="20" y="70" class="pin-num">Pin 24</text>
      <text x="280" y="70" class="pin-name">PB0 (RESET)</text>
      <!-- 23 -->
      <text x="20" y="120" class="pin-num">Pin 23</text>
      <text x="280" y="120" class="pin-name">PB1 (SELECT)</text>
      <!-- 21 -->
      <text x="20" y="170" class="pin-num">Pin 21</text>
      <text x="280" y="170" class="pin-name">PB3 (COLOR)</text>
      <!-- 17 -->
      <text x="20" y="220" class="pin-num">Pin 17</text>
      <text x="280" y="220" class="pin-name">PB6 (L DIFF)</text>
      <!-- 16 -->
      <text x="20" y="270" class="pin-num">Pin 16</text>
      <text x="280" y="270" class="pin-name">PB7 (R DIFF)</text>
      <!-- 1 -->
      <text x="20" y="320" class="pin-num">Pin 1</text>
      <text x="280" y="320" class="pin-name">VSS (GND)</text>
    </g>
  </g>

  <!-- Right Panel: Pi -->
  <g transform="translate(850, 60)">
    <rect width="300" height="350" rx="8" fill="#276749" />
    <text x="150" y="30" class="panel-title">Raspberry Pi 3B+</text>
    <text x="150" y="50" class="panel-subtitle">(GPIO Header)</text>
    
    <g transform="translate(0, 10)">
      <!-- 27 -->
      <text x="280" y="70" class="pi-bcm">BCM 27</text>
      <text x="20" y="70" class="pi-phys">Phys 13</text>
      <!-- 22 -->
      <text x="280" y="120" class="pi-bcm">BCM 22</text>
      <text x="20" y="120" class="pi-phys">Phys 15</text>
      <!-- 4 -->
      <text x="280" y="170" class="pi-bcm">BCM 4</text>
      <text x="20" y="170" class="pi-phys">Phys 7</text>
      <!-- 23 -->
      <text x="280" y="220" class="pi-bcm">BCM 23</text>
      <text x="20" y="220" class="pi-phys">Phys 16</text>
      <!-- 25 -->
      <text x="280" y="270" class="pi-bcm">BCM 25</text>
      <text x="20" y="270" class="pi-phys">Phys 22</text>
      <!-- GND -->
      <text x="280" y="320" class="pi-bcm">GND</text>
      <text x="20" y="320" class="pi-phys">Phys 6</text>
    </g>
  </g>

  <!-- Wires — Y coords match pin text rows: 70+60=130 offset (panel y=60, inner g y=10, text rows 70/120/170/220/270/320) -->
  <g fill="none" stroke-width="4">
     <!-- RESET (Blue): RIOT Pin24 row y=60+10+70=140, Pi row y=60+10+70=140 -->
     <path d="M 350 140 L 850 140" stroke="#4299E1" />
     <rect x="540" y="130" width="120" height="20" fill="white" opacity="0.9" rx="4" stroke="none"/>
     <text x="600" y="145" class="wire-label" fill="#2b6cb0">GAME RESET</text>

     <!-- SELECT (Yellow): row y=190 -->
     <path d="M 350 190 L 850 190" stroke="#ECC94B" />
     <rect x="540" y="180" width="120" height="20" fill="white" opacity="0.9" rx="4" stroke="none"/>
     <text x="600" y="195" class="wire-label" fill="#b7791f">GAME SELECT</text>

     <!-- COLOR (Green): row y=240 -->
     <path d="M 350 240 L 850 240" stroke="#48BB78" />
     <rect x="540" y="230" width="120" height="20" fill="white" opacity="0.9" rx="4" stroke="none"/>
     <text x="600" y="245" class="wire-label" fill="#2f855a">B/W COLOR</text>

     <!-- L DIFF (Orange): row y=290 -->
     <path d="M 350 290 L 850 290" stroke="#ED8936" />
     <rect x="540" y="280" width="120" height="20" fill="white" opacity="0.9" rx="4" stroke="none"/>
     <text x="600" y="295" class="wire-label" fill="#c05621">LEFT DIFF</text>

     <!-- R DIFF (Purple): row y=340 -->
     <path d="M 350 340 L 850 340" stroke="#9F7AEA" />
     <rect x="540" y="330" width="120" height="20" fill="white" opacity="0.9" rx="4" stroke="none"/>
     <text x="600" y="345" class="wire-label" fill="#6b46c1">RIGHT DIFF</text>

     <!-- GND (Black): row y=390 -->
     <path d="M 350 390 L 850 390" stroke="#2D3748" />
     <rect x="540" y="380" width="120" height="20" fill="white" opacity="0.9" rx="4" stroke="none"/>
     <text x="600" y="395" class="wire-label" fill="#1a202c">GND</text>
  </g>
  
  <!-- Connection dots at panel edges -->
  <g>
    <!-- Left (RIOT panel right edge x=50+300=350) -->
    <circle cx="350" cy="140" r="5" fill="#ecc94b" />
    <circle cx="350" cy="190" r="5" fill="#ecc94b" />
    <circle cx="350" cy="240" r="5" fill="#ecc94b" />
    <circle cx="350" cy="290" r="5" fill="#ecc94b" />
    <circle cx="350" cy="340" r="5" fill="#ecc94b" />
    <circle cx="350" cy="390" r="5" fill="#ecc94b" />
    <!-- Right (Pi panel left edge x=850) -->
    <circle cx="850" cy="140" r="5" fill="#68d391" />
    <circle cx="850" cy="190" r="5" fill="#68d391" />
    <circle cx="850" cy="240" r="5" fill="#68d391" />
    <circle cx="850" cy="290" r="5" fill="#68d391" />
    <circle cx="850" cy="340" r="5" fill="#68d391" />
    <circle cx="850" cy="390" r="5" fill="#68d391" />
  </g>

  <!-- Notes Box -->
  <g transform="translate(100, 430)">
    <rect width="1000" height="30" fill="#fff5f5" stroke="#fc8181" stroke-width="1" rx="4"/>
    <text x="500" y="20" class="note-text">
      NOTE: POWER (BCM 26) and CHANNEL (BCM 6) switches wire directly to switch contacts, not through the RIOT socket.
    </text>
  </g>

  <!-- Legend -->
  <g transform="translate(150, 475)">
    <!-- Reset -->
    <rect x="0" y="0" width="15" height="15" fill="#4299E1" rx="2" />
    <text x="20" y="12" class="legend-text">Reset</text>
    
    <!-- Select -->
    <rect x="70" y="0" width="15" height="15" fill="#ECC94B" rx="2" />
    <text x="90" y="12" class="legend-text">Select</text>

    <!-- Color -->
    <rect x="150" y="0" width="15" height="15" fill="#48BB78" rx="2" />
    <text x="170" y="12" class="legend-text">Color</text>
    
    <!-- L Diff -->
    <rect x="220" y="0" width="15" height="15" fill="#ED8936" rx="2" />
    <text x="240" y="12" class="legend-text">L. Diff</text>
    
    <!-- R Diff -->
    <rect x="300" y="0" width="15" height="15" fill="#9F7AEA" rx="2" />
    <text x="320" y="12" class="legend-text">R. Diff</text>
    
    <!-- GND -->
    <rect x="380" y="0" width="15" height="15" fill="#2D3748" rx="2" />
    <text x="400" y="12" class="legend-text">GND</text>
    

  </g>
</svg>